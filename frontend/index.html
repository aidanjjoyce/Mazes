<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mazes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg:        #0d0f0e;
      --surface:   #141714;
      --border:    #232623;
      --accent:    #7fff6e;
      --accent-dim:#3a7a33;
      --muted:     #4a524a;
      --text:      #d4e0d3;
      --text-dim:  #6b776a;
      --start:     #7fff6e;
      --end:       #ff6e6e;
      --wall:      #d4e0d3;
      --cell:      #141714;
      --path:      #2a3f28;
      --radius:    6px;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    header {
      padding: 28px 40px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
 
    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
 
    header span {
      font-size: 13px;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
    }
 
    main {
      flex: 1;
      display: flex;
      gap: 0;
    }
 
    /* ── sidebar ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
 
    .sidebar-section h2 {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
    }
 
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
 
    .field label {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
    }
 
    .field input[type=range] {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: var(--border);
      outline: none;
      border-radius: 2px;
    }
    .field input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
 
    .field .range-value {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
    }
 
    .btn-generate {
      width: 100%;
      padding: 11px 0;
      background: var(--accent);
      color: #0d0f0e;
      border: none;
      border-radius: var(--radius);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-generate:hover { opacity: 0.88; }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }
 
    /* stats */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .stat .val {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat .lbl {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
 
    /* legend */
    .legend { display: flex; flex-direction: column; gap: 7px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
    .legend-swatch {
      width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0;
    }
 
    /* ── canvas area ── */
    .canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }
 
    .empty-state {
      text-align: center;
      color: var(--muted);
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.4;
    }
    .empty-state p {
      font-size: 13px;
      font-family: 'Space Mono', monospace;
    }
 
    canvas {
      display: block;
      image-rendering: pixelated;
    }
 
    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13,15,14,0.7);
      backdrop-filter: blur(2px);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
 
    .error-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #3f1a1a;
      border: 1px solid #7f3333;
      color: #ff9999;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
 
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
 
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;
 
    const CELL = 22;   // px per cell
    const WALL = 2;    // wall stroke width
 
    function drawMaze(canvas, maze) {
      const ctx = canvas.getContext("2d");
      const W = maze.width  * CELL;
      const H = maze.height * CELL;
      canvas.width  = W;
      canvas.height = H;
 
      // background
      ctx.fillStyle = "#141714";
      ctx.fillRect(0, 0, W, H);
 
      for (let y = 0; y < maze.height; y++) {
        for (let x = 0; x < maze.width; x++) {
          const px = x * CELL;
          const py = y * CELL;
          const cell = maze.cells[y][x];
 
          // start / end markers
          const isStart = maze.start.x === x && maze.start.y === y;
          const isEnd   = maze.end.x   === x && maze.end.y   === y;
 
          if (isStart) {
            ctx.fillStyle = "rgba(127,255,110,0.15)";
            ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
          } else if (isEnd) {
            ctx.fillStyle = "rgba(255,110,110,0.15)";
            ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
          }
 
          ctx.strokeStyle = "#d4e0d3";
          ctx.lineWidth   = WALL;
 
          if (cell.walls.N) {
            ctx.beginPath();
            ctx.moveTo(px, py); ctx.lineTo(px + CELL, py);
            ctx.stroke();
          }
          if (cell.walls.S) {
            ctx.beginPath();
            ctx.moveTo(px, py + CELL); ctx.lineTo(px + CELL, py + CELL);
            ctx.stroke();
          }
          if (cell.walls.W) {
            ctx.beginPath();
            ctx.moveTo(px, py); ctx.lineTo(px, py + CELL);
            ctx.stroke();
          }
          if (cell.walls.E) {
            ctx.beginPath();
            ctx.moveTo(px + CELL, py); ctx.lineTo(px + CELL, py + CELL);
            ctx.stroke();
          }
        }
      }
 
      // dot markers for start / end
      const drawDot = (x, y, color) => {
        const cx = x * CELL + CELL / 2;
        const cy = y * CELL + CELL / 2;
        ctx.beginPath();
        ctx.arc(cx, cy, CELL * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      };
      drawDot(maze.start.x, maze.start.y, "#7fff6e");
      drawDot(maze.end.x,   maze.end.y,   "#ff6e6e");
    }
 
    function Slider({ label, value, min, max, onChange }) {
      return (
        <div className="field">
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
            <label>{label}</label>
            <span className="range-value">{value}</span>
          </div>
          <input type="range" min={min} max={max} value={value}
            onChange={e => onChange(Number(e.target.value))} />
        </div>
      );
    }
 
    function App() {
      const [width,   setWidth]   = useState(15);
      const [height,  setHeight]  = useState(15);
      const [maze,    setMaze]    = useState(null);
      const [loading, setLoading] = useState(false);
      const [error,   setError]   = useState(null);
      const canvasRef = useRef(null);
 
      useEffect(() => {
        if (maze && canvasRef.current) {
          drawMaze(canvasRef.current, maze);
        }
      }, [maze]);
 
      const generate = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch("/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ width, height }),
          });
          if (!res.ok) throw new Error(`Server error ${res.status}`);
          const data = await res.json();
          setMaze(data);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      }, [width, height]);
 
      const cellCount = width * height;
 
      return (
        <>
          <header>
            <h1>MAZES</h1>
            <span>// maze lab v0.1</span>
          </header>
          <main>
            <aside className="sidebar">
              <div className="sidebar-section">
                <h2>Parameters</h2>
                <Slider label="width"  value={width}  min={5} max={40} onChange={setWidth}  />
                <Slider label="height" value={height} min={5} max={40} onChange={setHeight} />
                <button className="btn-generate" onClick={generate} disabled={loading}>
                  {loading ? "generating..." : "generate maze"}
                </button>
              </div>
 
              {maze && (
                <div className="sidebar-section">
                  <h2>Stats</h2>
                  <div className="stat-grid">
                    <div className="stat">
                      <div className="val">{maze.width}×{maze.height}</div>
                      <div className="lbl">size</div>
                    </div>
                    <div className="stat">
                      <div className="val">{cellCount}</div>
                      <div className="lbl">cells</div>
                    </div>
                  </div>
                </div>
              )}
 
              <div className="sidebar-section">
                <h2>Legend</h2>
                <div className="legend">
                  <div className="legend-item">
                    <div className="legend-swatch" style={{background:"#7fff6e"}} />
                    start
                  </div>
                  <div className="legend-item">
                    <div className="legend-swatch" style={{background:"#ff6e6e"}} />
                    end
                  </div>
                </div>
              </div>
            </aside>
 
            <div className="canvas-area">
              {!maze && !loading && (
                <div className="empty-state">
                  <div className="icon">⌗</div>
                  <p>generate a maze to begin</p>
                </div>
              )}
              {maze && <canvas ref={canvasRef} />}
              {loading && (
                <div className="loading-overlay">
                  <div className="spinner" />
                </div>
              )}
              {error && <div className="error-bar">error: {error}</div>}
            </div>
          </main>
        </>
      );
    }
 
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
